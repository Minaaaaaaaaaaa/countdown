<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --card: #0d0d0d;
    --accent: #e8ff47;
    --accent2: #ff4775;
    --blood: #8b0000;
    --blood2: #cc1111;
    --text: #f0f0f0;
    --muted: #555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 0 8vw;
  }

  /* ── 배경 SVG 레이어 ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  /* grain */
  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
    z-index: 1;
  }

  /* ── 유혈 스플래쉬 SVG (인라인) ── */
  .blood-svg {
    position: fixed;
    pointer-events: none;
    z-index: 1;
  }
  .blood-svg.top-left  { top: -30px; left: -20px; width: 55vw; max-width: 380px; opacity: 0.75; }
  .blood-svg.top-right { top: -10px; right: -10px; width: 40vw; max-width: 280px; opacity: 0.6; transform: scaleX(-1); }
  .blood-svg.mid-right { top: 38%; right: -30px; width: 30vw; max-width: 200px; opacity: 0.45; transform: rotate(20deg) scaleX(-1); }

  /* ── 지하철 좌석 실루엣 (하단 고정) ── */
  .subway-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 0;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
  }
  .subway-wrap svg { width: 100%; display: block; }

  /* ── 콘텐츠 ── */
  .wrapper {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    padding: 2rem 0 max(160px, 28vw);
  }

  .label {
    font-weight: 300;
    font-size: clamp(0.7rem, 2.5vw, 0.95rem);
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 1rem;
    line-height: 1.6;
    word-break: keep-all;
    animation: fadeUp 0.8s ease both;
  }

  .target-date {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2rem, 7vw, 4.5rem);
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s 0.1s ease both;
    text-shadow: 0 0 50px rgba(232,255,71,0.25);
  }

  .blocks {
    display: flex;
    gap: clamp(0.5rem, 2vw, 1.5rem);
    align-items: flex-start;
    justify-content: center;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .block {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    max-width: 110px;
  }

  .num-wrap {
    background: var(--card);
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: clamp(0.8rem, 3vw, 1.6rem) clamp(0.5rem, 2vw, 1.6rem);
    position: relative;
    overflow: hidden;
    width: 100%;
    text-align: center;
  }

  .num-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .num-wrap::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1px;
    background: rgba(255,255,255,0.03);
    z-index: 2;
  }

  .num {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.4rem, 9vw, 5.5rem);
    line-height: 1;
    color: var(--text);
    display: block;
  }

  .num.flip { animation: flipNum 0.3s ease; }

  @keyframes flipNum {
    0%   { transform: translateY(0); opacity: 1; }
    40%  { transform: translateY(-10px); opacity: 0; }
    60%  { transform: translateY(8px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .unit {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-top: 0.6rem;
    text-transform: uppercase;
  }

  .sep {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(1.8rem, 6vw, 3.5rem);
    color: var(--muted);
    margin-top: clamp(0.8rem, 2.5vw, 1.5rem);
    opacity: 0.4;
    animation: blink 1s step-end infinite;
    flex: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.1; }
  }

  .done-msg {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2rem, 8vw, 4rem);
    color: var(--accent2);
    display: none;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .progress-wrap {
    margin-top: 2rem;
    width: 100%;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .progress-bar-bg {
    height: 2px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 1s linear;
    box-shadow: 0 0 8px rgba(232,255,71,0.35);
  }
</style>

<!-- 콘텐츠 -->
<div class="wrapper">
  <p class="label">괴담에 떨어져도 출근해야 하는구나 웹툰 런칭</p>
  <p class="target-date">2026. 06. 05 &nbsp;22:00</p>

  <div id="timer" class="blocks">
    <div class="block">
      <div class="num-wrap"><span class="num" id="days">--</span></div>
      <span class="unit">일</span>
    </div>
    <div class="sep">:</div>
    <div class="block">
      <div class="num-wrap"><span class="num" id="hours">--</span></div>
      <span class="unit">시간</span>
    </div>
    <div class="sep">:</div>
    <div class="block">
      <div class="num-wrap"><span class="num" id="minutes">--</span></div>
      <span class="unit">분</span>
    </div>
    <div class="sep">:</div>
    <div class="block">
      <div class="num-wrap"><span class="num" id="seconds">--</span></div>
      <span class="unit">초</span>
    </div>
  </div>

  <div class="done-msg" id="done">🎉 D-DAY 도착!</div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-info">
      <span id="progLabel">진행률</span>
      <span id="progPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>
</div>

<script>
  const TARGET = new Date('2026-06-05T22:00:00+09:00').getTime();
  const START = Date.now();
  const TOTAL = TARGET - START;

  const els = {
    days: document.getElementById('days'),
    hours: document.getElementById('hours'),
    minutes: document.getElementById('minutes'),
    seconds: document.getElementById('seconds'),
  };
  const timer = document.getElementById('timer');
  const done = document.getElementById('done');
  const bar = document.getElementById('progressBar');
  const pct = document.getElementById('progPct');

  function pad(n) { return String(n).padStart(2, '0'); }

  function flip(el, val) {
    const str = pad(val);
    if (el.textContent !== str) {
      el.classList.remove('flip');
      void el.offsetWidth;
      el.classList.add('flip');
      el.textContent = str;
    }
  }

  function tick() {
    const now = Date.now();
    const diff = TARGET - now;
    if (diff <= 0) {
      timer.style.display = 'none';
      done.style.display = 'block';
      bar.style.width = '100%';
      pct.textContent = '100%';
      return;
    }
    const totalSec = Math.floor(diff / 1000);
    const s = totalSec % 60;
    const m = Math.floor(totalSec / 60) % 60;
    const h = Math.floor(totalSec / 3600) % 24;
    const d = Math.floor(totalSec / 86400);
    flip(els.days, d);
    flip(els.hours, h);
    flip(els.minutes, m);
    flip(els.seconds, s);
    const elapsed = Math.max(0, TOTAL - diff);
    const p = Math.min(100, (elapsed / TOTAL) * 100).toFixed(1);
    bar.style.width = p + '%';
    pct.textContent = p + '%';
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
